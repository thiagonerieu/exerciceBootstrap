<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visita Digital</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card">
        <div class="card__header">
            <img src="https://via.placeholder.com/100" alt="Foto de Perfil" class="card__image">
            <h1 class="card__name">Seu Nome</h1>
            <p class="card__title">Desenvolvedor Full Stack</p>
        </div>
        
        <div class="card__body">
            <p class="card__text">Transformando café em código e ideias em realidade digital.</p>
        </div>

        <div class="card__footer">
            <a href="#" class="btn btn--primary">LinkedIn</a>
            <a href="#" class="btn btn--secondary">GitHub</a>
        </div>
    </div>

</body>
</html>
